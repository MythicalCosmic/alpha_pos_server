services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-alpha_pos}
      POSTGRES_USER: ${DB_USER:-alpha_pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alpha_pos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        # Stamped into the image -> reported by /healthz. The deploy scripts
        # export GIT_SHA before `up --build`; defaults to "unknown" otherwise.
        GIT_SHA: ${GIT_SHA:-unknown}
    # Tag the built image so the customer-bot poller can reuse it (built once).
    image: alpha_pos_server:local
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # The security-critical trio is set HERE (environment overrides env_file)
      # so a production bring-up can't silently inherit a stale DEBUG=True or a
      # placeholder SECRET_KEY from a developer .env:
      #   - DEBUG defaults to False; a developer opts in via DEBUG=True in .env.
      #   - SECRET_KEY is fail-loud — compose refuses to start without it.
      #   - ALLOWED_HOSTS defaults to localhost; set it for any real hostname.
      DEBUG: ${DEBUG:-False}
      # Single-quoted: the ':' in the error message would otherwise make YAML
      # read it as a nested mapping. Compose still interpolates ${...} after.
      SECRET_KEY: '${SECRET_KEY:?SECRET_KEY must be set in .env (generate: python -c "import secrets; print(secrets.token_urlsafe(64))")}'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-alpha_pos}
      DB_USER: ${DB_USER:-alpha_pos}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_REDIS: ${USE_REDIS:-True}
      # This installation currently has one operational branch. Branch-scoped
      # cloud CRUD that omits branch_id targets it explicitly instead of
      # creating invisible branch_id=cloud rows. Multi-branch deployments must
      # set this empty and pass branch_id per operation.
      CLOUD_DEFAULT_TARGET_BRANCH_ID: ${CLOUD_DEFAULT_TARGET_BRANCH_ID:-branch1}
      # Pin MEDIA_ROOT to the persisted volume below so HR documents
      # (ID scans, contracts, medical books) survive container rebuilds.
      MEDIA_ROOT: /app/private_media
    volumes:
      # Without this, HR uploads land in the container's writable layer and
      # are silently lost on every `docker compose up --build` / redeploy.
      - media_data:/app/private_media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    # Customer Telegram bot poller (getUpdates). Reuses the web image (built
    # SINGLE instance only — Telegram forbids two getUpdates pollers. The HTTP API
    # + websockets stay on `web`; this only drives Telegram.
    # Same build as `web` so Compose BUILDS this image instead of trying to PULL the
    # local-only tag from a registry (which fails with "pull access denied"). The
    # shared image: tag means it's the same image as web (built once / cache hit).
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: alpha_pos_server:local
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$${CUSTOMER_BOT_TOKEN:-}" ]; then
          exec python manage.py run_customer_bot
        fi
        echo "CUSTOMER_BOT_TOKEN is unset; bot poller is parked."
        exec tail -f /dev/null
    # unless-stopped: restart the poller on ANY exit AND on host reboot. Docker does
    # NOT auto-start `on-failure` containers after a reboot, which left the customer
    # bot down after a server restart. When no token is configured the command parks
    # cleanly instead of creating a restart loop.
    restart: unless-stopped
    # The shared image bakes an HTTP `/healthz` HEALTHCHECK for `web`; this poller
    # runs no web server on :8000, so that probe always fails and marks a perfectly
    # healthy bot "unhealthy". Liveness for a single-process poller IS the container
    # running (restart: unless-stopped covers crashes + reboots), so disable the
    # inherited probe rather than report a permanent false negative.
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: '${SECRET_KEY:?SECRET_KEY must be set in .env}'
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLOUD_DEFAULT_TARGET_BRANCH_ID: ${CLOUD_DEFAULT_TARGET_BRANCH_ID:-branch1}
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
