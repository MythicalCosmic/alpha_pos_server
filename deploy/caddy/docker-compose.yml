# Caddy reverse proxy — terminates TLS (automatic Let's Encrypt certs via the
# nip.io hostnames) and forwards to the two app stacks over the shared `edge`
# network. The Caddyfile is generated by ../deploy.sh with your server IP.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # issued certs live here — persist them
      - caddy_config:/config
    networks:
      - edge

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
    external: true
