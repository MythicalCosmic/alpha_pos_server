# Restricted reverse-tunnel account used by authorized Alpha POS support.
# The desktop connects outward; the full local DB/API remain reachable only on
# this relay's loopback interface and therefore still require a root/operator
# SSH session to inspect.
Match User alphapos-support
    PubkeyAuthentication yes
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    AllowTcpForwarding remote
    GatewayPorts no
    PermitListen 127.0.0.1:15433 127.0.0.1:18000
    PermitOpen none
    PermitTTY no
    X11Forwarding no
    AllowAgentForwarding no
    MaxSessions 0
