# Dedicated operator account for reaching active support listeners. The account
# cannot create remote forwards, open a shell, or connect anywhere except the
# two relay-loopback ports published by alphapos-support.
Match User alphapos-inspector
    AuthenticationMethods publickey
    PubkeyAuthentication yes
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    AllowTcpForwarding local
    AllowStreamLocalForwarding no
    GatewayPorts no
    PermitOpen 127.0.0.1:15433 127.0.0.1:18000
    PermitListen none
    PermitTTY no
    PermitTunnel no
    PermitUserRC no
    X11Forwarding no
    AllowAgentForwarding no
    MaxSessions 0
    ClientAliveInterval 30
    ClientAliveCountMax 3

Match all
