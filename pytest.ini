[pytest]
DJANGO_SETTINGS_MODULE = alpha_pos.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
# test_all_endpoints.py is a standalone live-HTTP script (it sys.exits at
# import), not a pytest module — ignore it so a bare `pytest` matches CI
# instead of erroring during collection.
addopts = -ra --strict-markers --strict-config --ignore=test_all_endpoints.py
markers =
    slow: tests that exercise multiple subsystems
