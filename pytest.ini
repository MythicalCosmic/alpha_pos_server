[pytest]
DJANGO_SETTINGS_MODULE = config.settings
# Always test the core commit pinned by this repository. Without this, a stale
# globally/editably installed ``base`` package can silently shadow the submodule.
pythonpath =
    .
    alpha_pos_core
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
# test_all_endpoints.py is a standalone live-HTTP script (it sys.exits at
# import), not a pytest module — ignore it so a bare `pytest` matches CI
# instead of erroring during collection.
addopts = -ra --strict-markers --strict-config --ignore=test_all_endpoints.py --ignore=alpha_pos_core
markers =
    slow: tests that exercise multiple subsystems
